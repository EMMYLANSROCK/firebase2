<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson Plan Management System</title>

<style>
body, html{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
}

/* BACKGROUND SLIDESHOW */
.bg-slideshow{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    animation: slideBg 20s infinite;
    background-size:cover;
    background-position:center;
}

@keyframes slideBg{
    0%{background-image:url('https://images.unsplash.com/photo-1523240795612-9a054b0db644');}
    25%{background-image:url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b');}
    50%{background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');}
    75%{background-image:url('https://images.unsplash.com/photo-1519452575417-564c1401ecc0');}
    100%{background-image:url('https://images.unsplash.com/photo-1523240795612-9a054b0db644');}
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:20px auto;
    background:rgba(255,255,255,0.93);
    padding:20px;
    border-radius:10px;
}
.dashboard-header{

    text-align:center;
    background:linear-gradient(135deg,#0f172a,#1a73e8);
    color:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;

}


.dashboard-header h1{

    font-size:32px;
    margin:0;

}


.dashboard-header h2{

    font-size:22px;

}


.dashboard-header p{

    font-size:14px;
    opacity:0.9;

}
.dashboard-menu{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.dashboard-menu button{
    width:auto;
    min-width:140px;
}
/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:10px;
}

/* INPUTS */
input, textarea{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* LABEL */
label{
    font-size:12px;
    color:#1a73e8;
    display:block;
}

/* BUTTONS */
button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
}

.save{background:#1a73e8;color:white;}
.clear{background:#e53935;color:white;}
.view{background:#43a047;color:white;}
.edit{background:#ff9800;color:white;}
.delete{background:#e53935;color:white;}
.print{background:#555;color:white;}

#notify{
    position:fixed;
    top:20px;
    right:20px;
    background:#43a047;
    color:white;
    padding:10px;
    border-radius:5px;
    display:none;
}

/* SECTION */
.section{
    margin-bottom:10px;
}


/* TELEPHONE */
@media(max-width:900px){

.grid{
    grid-template-columns:1fr;
}

.container{
    margin:5px;
    padding:10px;
}

button{
    width:100%;
}

}
@media(max-width:600px){

body,html{
    width:100%;
    overflow-x:hidden;
}

.container{
    width:95%;
    margin:10px auto;
    padding:10px;
}

.dashboard-header h1{
    font-size:24px;
}

.dashboard-header h2{
    font-size:18px;
}

.dashboard-menu{
    flex-direction:column;
    align-items:center;
}

.dashboard-menu button{
    width:90%;
}

.grid{
    grid-template-columns:1fr;
}

input, textarea{
    width:100%;
    box-sizing:border-box;
}

button{
    width:100%;
}

}
    #loginPage{
    width:380px;
    margin:80px auto;
    padding:35px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
}


#loginPage h2{
    color:#0f172a;
    font-size:30px;
    font-weight:bold;
    margin-bottom:30px;
}


/* INPUT MODERN STYLE */
#loginPage input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.9);
    border-radius:12px;
    font-size:15px;
    box-sizing:border-box;
    transition:0.3s;
}


#loginPage input:focus{
    box-shadow:0 0 10px #1a73e8;
    transform:scale(1.02);
}


/* BUTTON MODERN STYLE */
#loginPage button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1a73e8,#0f172a);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}


#loginPage button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(26,115,232,0.5);
}


/* Forgot Password button */
#loginPage button:last-child{
    background:linear-gradient(135deg,#43a047,#2e7d32);
}


/* MOBILE */
@media(max-width:500px){

#loginPage{
    width:90%;
    padding:25px;
}

}
</style>
</head>

<body>

<div class="bg-slideshow"></div>
<div id="notify"></div>


<!-- LOGIN PAGE -->
<div id="loginPage" class="container">

<h2>🤖 NovaMind Lesson Plan</h2>

<input id="fullname" placeholder="Full Name">

<br><br>

<input id="email" placeholder="Email">

<br><br>
<input id="phone" placeholder="Phone Number">

<br><br>
<input id="password" type="password" placeholder="Password">

<br><br>

<button onclick="signup()">
Create Account
</button>

<button onclick="login()">
Login
</button>
<button onclick="forgotPassword()">
Forgot Password?
</button>
</div>


<!-- LESSON PLAN SYSTEM -->
<div id="lessonSystem" class="container" style="display:none;">

<div class="dashboard-header">

<h1>🤖 EMMYLANSROCK ENGINE</h1>

<h2>📘 NovaMind Lesson Plan Management System</h2>

<p>Smart Education Management Powered by AI Technology</p>

<div class="dashboard-menu">

<button class="save" onclick="window.scrollTo({top:0,behavior:'smooth'})">
🏠 Home
</button>

<button class="view" onclick="viewPlans()">
📚 View Saved
</button>

<button class="print" onclick="window.print()">
🖨 Print Reports
</button>

<button class="delete" onclick="logout()">
🚪 Logout
</button>


</div> <!-- End dashboard-menu -->

</div> <!-- End dashboard-header -->

<!-- BASIC INFO -->
<div class="grid">
    <div><label>School Name \ Izina ry’ishuri</label><input id="school"></div>
    <div><label>Teacher Name \ Izina ry’umwarimu</label><input id="teacher"></div>
    <div><label>Subject \ Isomo</label><input id="subject"></div>
    <div><label>Class / Grade \ Icyiciro cy’abanyeshuri</label><input id="class"></div>
    <div><label>Unit \ Igice cy’isomo</label><input id="unit"></div>
</div>

<br>

<div class="grid">
    <div><label>Topic \ Insanganyamatsiko</label><input id="topic"></div>
    <div><label>Sub Topic \ Insanganyamatsiko nto</label><input id="subtopic"></div>
    <div><label>Date</label><input type="date" id="date"></div>
    <div><label>Time</label><input type="time" id="time"></div>
    <div><label>Duration</label><input id="duration"></div>
</div>

<hr>

<!-- FULL SECTIONS RESTORED -->
<div class="section"><label>General Objective \ Intego rusange</label><textarea id="generalObj"></textarea></div>
<div class="section"><label>Specific Objectives \ Intego zihariye</label><textarea id="specificObj"></textarea></div>
<div class="section"><label>Competencies \ Ubushobozi</label><textarea id="competencies"></textarea></div>
<div class="section"><label>Learning Outcomes \ Ibyitezwe ku banyeshuri</label><textarea id="outcomes"></textarea></div>

<div class="section"><label>Resources \ Ibikoresho</label><textarea id="resources"></textarea></div>
<div class="section"><label>Teaching Materials \ Ibikoresho mwarimu akoresha</label><textarea id="teachingMat"></textarea></div>
<div class="section"><label>Learning Materials \ Ibikoresho by’abanyeshuri bakoresha</label><textarea id="learningMat"></textarea></div>
<div class="section"><label>ICT Tools \ Ibikoresho by’ikoranabuhanga</label><textarea id="ict"></textarea></div>
<div class="section"><label>References \ Aho wakuye amakuru</label><textarea id="ref"></textarea></div>

<div class="section"><label>Teacher Activities (Intro) \ Ibikorwa bya mwarimu</label><textarea id="tIntro"></textarea></div>
<div class="section"><label>Learner Activities (Intro) \ Ibikorwa by’abanyeshuri</label><textarea id="lIntro"></textarea></div>
<div class="section"><label>Teacher Activities (Development) \ Ibikorwa bya mwarimu</label><textarea id="tDev"></textarea></div>
<div class="section"><label>Learner Activities (Development) \ Ibikorwa by’abanyeshuri</label><textarea id="lDev"></textarea></div>

<div class="section"><label>Questions \ Ibibazo</label><textarea id="questions"></textarea></div>
<div class="section"><label>Conclusion \ Umwanzuro</label><textarea id="conclusion"></textarea></div>
<div class="section"><label>Homework \ Umukoro</label><textarea id="homework"></textarea></div>

<div class="section"><label>Formative Assessment \ Isuzuma rihoraho</label><textarea id="formative"></textarea></div>
<div class="section"><label>Summative Assessment \ Isuzuma risoza</label><textarea id="summative"></textarea></div>
<div class="section"><label>Success Criteria \ Ibipimo by’uko isomo rigenze neza</label><textarea id="success"></textarea></div>

<div class="section"><label>Special Needs \ Abafite ibibazo byihariye</label><textarea id="special"></textarea></div>
<div class="section"><label>Gender Consideration \ Kuringaniza uburinganire</label><textarea id="gender"></textarea></div>
<div class="section"><label>Cross Cutting Issues \ Ibibazo rusange</label><textarea id="cross"></textarea></div>

<div class="section"><label>Challenges \ Ibibazo byahuye n’isomo</label><textarea id="challenges"></textarea></div>
<div class="section"><label>Improvements \ Ibyakosorwa</label><textarea id="improvements"></textarea></div>

<br>

<!-- BUTTONS RESTORED -->
<button class="save" onclick="savePlan()">Save Lesson Plan</button>

<button class="clear" onclick="clearForm()">Clear</button>

<button class="view" onclick="viewPlans()">View Saved</button>

<button class="print" onclick="window.print()">
Print Lesson Plan
</button>
<button class="delete" onclick="logout()">
Logout
</button>
<hr>

<input id="searchBox" placeholder="Search Lesson Plan..." onkeyup="searchPlans()">

<div id="output"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
setDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged,
updateProfile,
sendPasswordResetEmail

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const firebaseConfig = {
apiKey: "AIzaSyD-zCzeiRYEt4mmDYR62m9A7WyI-vk4r3k",
authDomain: "novamind-lesson-plan.firebaseapp.com",
projectId: "novamind-lesson-plan",
storageBucket: "novamind-lesson-plan.firebasestorage.app",
messagingSenderId: "151497101808",
appId: "1:151497101808:web:5a78006e07e8cc1df98d35",
measurementId: "G-2F33MKWW2M"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);


window.editingId = null;


// KUBONA DATA YOSE
function getData(){

let obj={};

document.querySelectorAll("#lessonSystem input, #lessonSystem textarea")
.forEach(el=>{

obj[el.id]=el.value;

});

return obj;

}


// SAVE / UPDATE
window.savePlan = async function(){

if(!auth.currentUser){

notify("Please login first");

return;

}

try{

let data = getData();

data.createdAt = Date.now();


if(window.editingId){

await updateDoc(
doc(db,"lessonPlans",window.editingId),
data
);

window.editingId=null;

notify("Updated Successfully");

}else{


await addDoc(
collection(db,"lessonPlans"),
{
...data,
userId: auth.currentUser.uid,
userEmail: auth.currentUser.email,
createdAt: Date.now()
}
);


notify("Saved Successfully To Firebase");

}


clearForm();


}catch(error){

console.log(error);

notify("Firebase Error: "+error.message);

}

}





window.clearForm=function(){

document.querySelectorAll("#lessonSystem input, #lessonSystem textarea")
.forEach(e=>e.value="");

}




window.viewPlans=async function(){

try{
let plans = await getDocs(
collection(db,"lessonPlans")
);


let html="<h3>Saved Lesson Plans</h3>";

let i=0;


plans.forEach((item)=>{


let p=item.data();

if(p.userId !== auth.currentUser.uid){
    return;
}
html+=`

<div style="background:#fff;padding:10px;margin:10px 0;border-radius:8px;">

<b>${i+1}. ${p.subject || ""} - ${p.topic || ""}</b><br>

Teacher: ${p.teacher || ""}<br>
School: ${p.school || ""}<br>

Class: ${p.class || ""}<br>

Date: ${p.date || ""}<br>

<button class="edit" onclick="editPlan('${item.id}')">
Edit
</button>

<button class="delete" onclick="deletePlan('${item.id}')">
Delete
</button>


</div>

`;

i++;

});

document.getElementById("output").innerHTML=html;


}catch(error){

notify("Error loading data: "+error.message);

}

}


window.deletePlan=async function(id){

let confirmDelete = confirm("Are you sure you want to delete this Lesson Plan?");

if(confirmDelete){

await deleteDoc(
doc(db,"lessonPlans",id)
);

notify("Deleted Successfully");

viewPlans();

}

}




window.editPlan = async function(id){

let plans = await getDocs(
collection(db,"lessonPlans")
);

plans.forEach((item)=>{

if(item.id === id){

let data=item.data();

Object.keys(data).forEach(key=>{

let input=document.getElementById(key);

if(input){

input.value=data[key];

}

});


window.editingId=id;

window.scrollTo({
top:0,
behavior:"smooth"
});


notify("Editing Lesson Plan");

}

});

}


// SHYIRA SEARCH HANO

window.searchPlans=function(){

let text=document
.getElementById("searchBox")
.value
.toLowerCase();
document.querySelectorAll("#output > div").forEach(function(div){

if(div.innerText.toLowerCase().includes(text)){

div.style.display="block";

}else{

div.style.display="none";

}

});

}


// AUTHENTICATION

window.signup = async function(){

let fullname=document.getElementById("fullname").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let password=document.getElementById("password").value;

try{

let userCredential = await createUserWithEmailAndPassword(
auth,
email,
password
);


await updateProfile(userCredential.user,{
displayName: fullname
});
await setDoc(doc(db,"users",userCredential.user.uid),{

fullname: fullname,
email: email,
phone: phone,
createdAt: Date.now()

});

// SANGIZA USER ARIKO NTAMWINJIZEMO
await signOut(auth);


// GARUKA KURI LOGIN
document.getElementById("loginPage").style.display="block";
document.getElementById("lessonSystem").style.display="none";


// SUKURA FORM
document.getElementById("fullname").value="";
document.getElementById("email").value="";
document.getElementById("password").value="";


notify("Account Created. Please Login");


}

catch(error){

notify(error.message);

}

}
window.login = async function(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;


try{

await signInWithEmailAndPassword(
auth,
email,
password
);

notify("Welcome back! You logged in successfully to NovaMind Lesson Plan");

}

catch(error){

notify(error.message);

}

}
window.forgotPassword = async function(){

let email = document.getElementById("email").value;


if(email == ""){

notify("Please enter your email first");

return;

}


try{

await sendPasswordResetEmail(auth,email);


notify("Password reset link sent to your email");


}

catch(error){

notify(error.message);

}

}
window.logout = async function(){

try{

await signOut(auth);

notify("Logged Out Successfully");

}

catch(error){

notify(error.message);

}

}
onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginPage").style.display="none";
document.getElementById("lessonSystem").style.display="block";

}
else{

document.getElementById("loginPage").style.display="block";
document.getElementById("lessonSystem").style.display="none";

}

});
// HANO HASIGARA NOTIFY

function notify(msg){

let n=document.getElementById("notify");

n.innerText=msg;

n.style.display="block";

setTimeout(()=>{

n.style.display="none";

},2000);

}

</script>


</body>
</html>
